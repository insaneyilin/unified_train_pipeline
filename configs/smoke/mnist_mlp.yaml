seed: 42
train:
  max_epochs: 1
  max_steps: 2
  log_interval: 1
  save_interval: 1000
  output_dir: unified_train_pipeline_outputs/smoke/mnist_mlp
  gradient_clip_norm: null
  distributed: false
  num_workers: 0
  amp: false
dataset:
  name: MnistDataset
  root: ./data
  train: true
  download: true
  batch_size: 16
val_dataset:
  name: MnistDataset
  root: ./data
  train: false
  download: true
  batch_size: 16
validate:
  enabled: true
  val_interval_steps: 1
  val_interval_epochs: 1
  max_val_batches: 1
  num_workers: 0
evaluation:
  name: MnistClassificationEvaluator
  num_classes: 10
visualization:
  name: MnistTensorBoardVisualizer
tensorboard:
  enabled: true
  log_dir: unified_train_pipeline_outputs/smoke/mnist_mlp/tb
  image_interval_steps: 1
  num_visualization_samples: 4
  image_buckets:
    random: true
    digit: true
    pred_outcome: true
model:
  name: UnifiedModel
  submodules:
    backbone:
      name: MnistMlpBackbone
      hidden_dim: 64
      num_classes: 10
loss:
  name: ClassificationCrossEntropyLoss
  weight: 1.0
optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0
