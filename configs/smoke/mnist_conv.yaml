seed: 42
train:
  max_epochs: 1
  max_steps: 2
  log_interval: 1
  save_interval: 1000
  output_dir: unified_train_pipeline_outputs/smoke/mnist_conv
  gradient_clip_norm: null
  distributed: false
  num_workers: 0
  amp: false
dataset:
  name: MnistDataset
  root: ./data
  train: true
  download: true
  batch_size: 16
model:
  name: UnifiedModel
  submodules:
    backbone:
      name: MnistConvBackbone
      num_classes: 10
loss:
  name: ClassificationCrossEntropyLoss
  weight: 1.0
optimizer:
  name: adam
  lr: 0.001
  weight_decay: 0.0
