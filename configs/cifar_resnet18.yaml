seed: 42
train:
  max_epochs: 1
  max_steps: 5
  log_interval: 1
  save_interval: 100
  output_dir: unified_train_pipeline_outputs/cifar_resnet18
  gradient_clip_norm: null
  distributed: false
  num_workers: 2
  amp: false
dataset:
  name: Cifar10Dataset
  root: ./data
  train: true
  download: true
  batch_size: 64
model:
  name: UnifiedModel
  submodules:
    backbone:
      name: CifarResNetBackbone
      num_classes: 10
loss:
  name: ClassificationCrossEntropyLoss
  weight: 1.0
optimizer:
  name: adam
  lr: 0.0005
  weight_decay: 0.0
